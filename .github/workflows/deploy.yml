name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm install

      - name: Check backend syntax
        run: node -e "
          const files = ['src/app.js','src/server.js','src/routes/auth.routes.js',
            'src/routes/survey.routes.js','src/routes/upload.routes.js',
            'src/middleware/auth.js','src/middleware/security.js',
            'src/services/bootstrap.js','src/services/encounters.js','src/utils/helpers.js'];
          let ok = true;
          for (const f of files) {
            try { require('./'+f); console.log('  OK: '+f); } catch(e) {
              if (e.message.includes('DB_PASSWORD')) continue; // expected without .env
              console.log('  FAIL: '+f+' - '+e.message); ok = false;
            }
          }
          process.exit(ok ? 0 : 1);
        "

      - name: Install frontend deps
        run: npm --prefix frontend install

      - name: Build frontend
        run: npm --prefix frontend run build

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ SERVER_HOST secret is not set"
            echo "Go to: Settings → Secrets and variables → Actions"
            echo "Add: SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, SERVER_PORT, SERVER_PATH"
            exit 1
          fi
          echo "✅ Secrets are configured"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          debug: true
          script: |
            cd ${{ secrets.SERVER_PATH }}

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing backend dependencies..."
            npm install --production

            echo "Installing frontend dependencies..."
            npm --prefix frontend install

            echo "Building frontend..."
            npm --prefix frontend run build

            echo "Restarting app..."
            pm2 restart survey-app || pm2 start src/server.js --name survey-app

            echo "Deployment finished"

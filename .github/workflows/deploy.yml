name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install backend deps
        run: npm install

      - name: Check backend syntax
        run: |
          node --check src/app.js
          node --check src/server.js
          node --check src/routes/auth.routes.js
          node --check src/routes/survey.routes.js
          node --check src/routes/upload.routes.js
          node --check src/middleware/auth.js
          node --check src/middleware/security.js
          node --check src/services/bootstrap.js
          node --check src/services/encounters.js
          node --check src/utils/helpers.js
          echo "All backend files pass syntax check"

      - name: Install frontend deps
        run: npm --prefix frontend install

      - name: Build frontend
        run: npm --prefix frontend run build

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check secrets and skip if not configured
        id: check_secrets
        run: |
          if [ -n "${{ secrets.SERVER_HOST }}" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
            echo "✅ Server secrets found, deployment will run"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No deployment secrets configured — skipping deploy."
            echo "   To enable: Settings → Secrets → add SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, SERVER_PORT, SERVER_PATH"
          fi

      - name: Deploy via SSH
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          debug: true
          script: |
            cd ${{ secrets.SERVER_PATH }}

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing backend dependencies..."
            npm install --production

            echo "Installing frontend dependencies..."
            npm --prefix frontend install

            echo "Building frontend..."
            npm --prefix frontend run build

            echo "Restarting app..."
            pm2 restart survey-app || pm2 start src/server.js --name survey-app

            echo "Deployment finished"

name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check src/app.js
          node --check src/server.js
          node --check src/routes/auth.routes.js
          node --check src/routes/survey.routes.js
          node --check src/routes/upload.routes.js
          node --check src/middleware/auth.js
          node --check src/middleware/security.js
          node --check src/services/bootstrap.js
          node --check src/services/encounters.js
          node --check src/utils/helpers.js

      - name: Build frontend
        run: |
          npm --prefix frontend install
          npm --prefix frontend run build

  CD:
    runs-on: ubuntu-latest
    needs: [CI]
    if: github.ref == 'refs/heads/main' && vars.CD_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          debug: true
          script: |
            cd ${{ secrets.SERVER_PATH }}
            git pull origin main
            npm install --production
            npm --prefix frontend install
            npm --prefix frontend run build
            pm2 restart survey-app || pm2 start src/server.js --name survey-app

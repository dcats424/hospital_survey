name: CI/CD Pipeline

on:
  push:
    branches:
      - main

# Prevent multiple deployments at the same time
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  CI:
    name: Continuous Integration
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Backend syntax check
        run: |
          echo "Checking backend files..."
          find src -name "*.js" -print0 | while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done

      - name: Frontend build check
        run: |
          echo "Building frontend..."
          npm --prefix frontend run build

      - name: CI Success
        run: echo "CI completed successfully"

  CD:
    name: Continuous Deployment
    runs-on: self-hosted
    needs: CI

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy application
        run: |
          set -e

          echo "=============================="
          echo "Starting deployment..."
          echo "=============================="

          cd /home/administrator/Desktop/hospital_survey

          echo "Pulling latest code..."
          git fetch origin    
          git reset --hard origin/main
          git clean -fdx -e .env

          echo "Installing backend dependencies..."
          npm ci --omit=dev

          echo "Installing frontend dependencies..."
          npm --prefix frontend ci

          echo "Updating database schema..."
          set -a
          source .env
          set +a

          PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -U $DB_USER -d $DB_NAME -f sql/schema.sql

          shopt -s nullglob
          for f in sql/migrations/*.sql; do
            echo "Running migration: $f"
            PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -U $DB_USER -d $DB_NAME -f "$f"
          done

          echo "Running seed data..."
          PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -U $DB_USER -d $DB_NAME -f sql/seed.sql

          echo "Building frontend..."
          npm --prefix frontend run build

          echo "Restarting PM2 application..."
          export NODE_ENV=production
          pm2 restart survey-backend --update-env || pm2 start src/server.js --name survey-backend

          echo "Saving PM2 process list..."
          pm2 save

          echo "Checking PM2 status..."
          pm2 status

          echo "=============================="
          echo "Deployment completed successfully"
          echo "=============================="